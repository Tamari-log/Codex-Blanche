<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Codex Blanche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex flex-col h-screen max-w-md mx-auto shadow-2xl bg-white">
        <header class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="text-xl font-serif font-bold tracking-widest text-slate-700">CODEX BLANCHE</h1>
            <button onclick="toggleSettings()" class="text-2xl opacity-70 hover:opacity-100 transition-opacity">⚙️</button>
        </header>

        <main id="chat-area" class="flex-grow overflow-y-auto p-4 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/paper.png')]">
            <div class="ai-msg">こんにちは、ブランシュ様。知恵の鏡へようこそ。</div>
        </main>

        <footer class="p-4 border-t bg-white pb-8">
            <div class="flex gap-2">
                <input type="text" id="user-input" class="flex-grow border border-slate-300 rounded-full px-5 py-2 focus:outline-none focus:border-slate-500" placeholder="問いを刻む...">
                <button onclick="handleSend()" class="bg-slate-800 text-white w-12 h-12 rounded-full shadow-lg active:scale-95 transition-transform">🖋️</button>
            </div>
        </footer>

        <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-6">
            <div class="bg-white rounded-3xl p-8 w-full shadow-2xl border border-slate-200">
                <h2 class="text-2xl font-serif font-bold mb-6 text-slate-800">秘術の設定</h2>
                <label class="block text-sm font-semibold text-slate-500 mb-2 uppercase tracking-tighter">Gemini API Key</label>
                <input type="password" id="api-key" class="w-full border rounded-xl p-3 mb-6 bg-slate-50 focus:ring-2 focus:ring-slate-400 outline-none" placeholder="Keyをここへ...">
                <button onclick="toggleSettings()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg">書庫を閉じる</button>
            </div>
        </div>
    </div>

    <script src="assets/js/gemini.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
