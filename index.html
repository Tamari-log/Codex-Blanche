<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Codex Blanche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-[#e3cfaa] dark:bg-slate-900 transition-colors duration-300">
    <div class="app-shell flex flex-col h-[100dvh] max-w-md mx-auto shadow-2xl bg-[#e8d8b3] dark:bg-slate-800 transition-colors duration-300 overflow-hidden">
        <header class="pt-[env(safe-area-inset-top)] px-4 pb-4 border-b dark:border-slate-700 flex justify-between items-center bg-[#e8d8b3]/90 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-10">
            <h1 class="text-xl font-serif font-bold tracking-widest text-[#40260f] dark:text-slate-200">CODEX BLANCHE</h1>
            <div class="flex gap-2">
                <button onclick="toggleHistoryPanel()" class="p-2 text-xl grayscale dark:invert opacity-70">📜</button>
                <button onclick="toggleSettings()" class="p-2 text-2xl grayscale dark:invert opacity-70">⚙️</button>
            </div>
        </header>

        <section class="border-b border-slate-200 dark:border-slate-700">
            <div class="px-3 py-2 flex items-center gap-2">
                <button id="system-preset-toggle" class="preset-toggle-btn" aria-expanded="false" aria-label="プリセット一覧を開く">☰</button>
            </div>
            <div id="system-preset-panel" class="system-preset-panel px-3 pb-3 hidden">
                <p class="text-xs text-slate-600 dark:text-slate-300 mb-2">システム / ユーザープリセット</p>
                <div id="system-persona-tabs" class="flex overflow-x-auto gap-2"></div>
            </div>
        </section>
        <main id="chat-area" class="flex-grow overflow-y-auto p-4 space-y-4 chat-bg scroll-smooth bg-transparent"></main>
        <footer class="p-4 border-t border-[#b89d74] dark:border-slate-700 bg-[#e2cfa7] dark:bg-slate-800 pb-[calc(env(safe-area-inset-bottom)+1rem)]">
            <div class="grid grid-cols-10 gap-3 items-center">
                <div class="col-span-8">
                    <textarea id="user-input" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-2xl px-4 py-2 focus:outline-none resize-none" placeholder="問いを深く刻む..." rows="1" enterkeyhint="send"></textarea>
                </div>
                <div class="col-span-2 flex justify-center">
                    <button onclick="handleSend()" class="bg-slate-800 dark:bg-slate-100 dark:text-slate-800 text-white w-12 h-12 rounded-full shadow-lg active:scale-90 transition-all flex items-center justify-center text-xl">🖋️</button>
                </div>
            </div>
        </footer>

        <aside id="history-panel" class="hidden absolute inset-0 bg-black/60 z-40">
            <div class="absolute right-0 top-0 h-full w-72 bg-white dark:bg-slate-900 p-4 overflow-y-auto">
                <h3 class="font-bold dark:text-white mb-3">会話履歴</h3>
                <div id="session-list" class="space-y-2"></div>
                <button onclick="deleteActiveSession()" class="mt-4 w-full bg-rose-700 text-white rounded-lg py-2">この会話を削除</button>
                <button onclick="toggleHistoryPanel()" class="mt-4 w-full bg-slate-700 text-white rounded-lg py-2">閉じる</button>
            </div>
        </aside>

        <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-6">
            <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-6 w-full shadow-2xl border border-slate-200 dark:border-slate-700 transform transition-all scale-100 max-h-[90dvh] overflow-y-auto">
                <h2 class="text-2xl font-serif font-bold mb-6 text-slate-800 dark:text-white text-center">写本の管理</h2>
                <div class="space-y-4">
                    <button onclick="toggleDarkMode()" id="mode-toggle-btn" class="w-full p-3 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold dark:text-white"></button>
                    <select id="provider" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white">
                        <option value="gemini">Gemini</option>
                        <option value="openai">ChatGPT (OpenAI)</option>
                    </select>
                    <select id="model" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white"></select>
                    <input type="password" id="gemini-key" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="Gemini API Key">
                    <input type="password" id="openai-key" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="OpenAI API Key">
                    <div class="space-y-2">
                        <textarea id="system-prompt" rows="4" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="システムプロンプト"></textarea>
                        <button id="clear-system-prompt-btn" class="w-full bg-slate-200 dark:bg-slate-700 dark:text-white py-2 rounded-lg">システムプロンプトを空にする</button>
                    </div>
                    <label class="text-sm dark:text-white">温度 <span id="temperature-value"></span></label>
                    <input id="temperature" type="range" min="0" max="2" step="0.1" class="w-full">
                    <label class="text-sm dark:text-white">コンテキスト長（トークン） <span id="max-tokens-value"></span></label>
                    <input id="max-tokens" type="range" min="256" max="150000" step="256" class="w-full">
                    <input id="persona-name" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="保存するプリセット名">
                    <button onclick="savePersona()" class="w-full bg-indigo-600 text-white py-2 rounded-lg">プリセット保存</button>
                    <button onclick="startNewSession()" class="w-full bg-slate-600 text-white py-2 rounded-lg">新規会話を開始</button>
                    <button onclick="deleteActiveSession()" class="w-full bg-rose-700 text-white py-2 rounded-lg">現在の会話を削除</button>
                </div>
                <button onclick="toggleSettings()" class="w-full mt-6 bg-slate-800 dark:bg-white dark:text-slate-800 text-white py-3 rounded-2xl font-bold">書庫に戻る</button>
            </div>
        </div>
    </div>

    <script src="assets/js/providers.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
