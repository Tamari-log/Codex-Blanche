<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Codex Blanche</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="./manifest.webmanifest">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body class="bg-[#e3cfaa] dark:bg-slate-900 transition-colors duration-300">
    <div class="app-shell flex flex-col h-[100dvh] max-w-md mx-auto shadow-2xl bg-[#e8d8b3] dark:bg-slate-800 transition-colors duration-300 overflow-hidden">
        <header class="pt-[env(safe-area-inset-top)] px-4 pb-4 border-b dark:border-slate-700 flex justify-between items-center bg-[#e8d8b3]/90 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-10">
            <h1 class="text-xl font-serif font-bold tracking-widest text-[#40260f] dark:text-slate-200">CODEX BLANCHE</h1>
            <div class="flex gap-2">
                <button id="drive-sync-btn" onclick="syncWithDrive()" class="p-2 text-xl grayscale dark:invert opacity-70" title="Googleドライブ同期">☁️</button>
                <button onclick="toggleHistoryPanel()" class="p-2 text-xl grayscale dark:invert opacity-70">📜</button>
                <button onclick="toggleSettings()" class="p-2 text-2xl grayscale dark:invert opacity-70">⚙️</button>
            </div>
        </header>

        <section class="border-b border-slate-200 dark:border-slate-700">
            <div class="px-3 py-2 flex items-center gap-2">
                <button id="system-preset-toggle" class="preset-toggle-btn" aria-expanded="false" aria-label="プリセットパネルを開閉">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
            <div id="system-preset-panel" class="system-preset-panel px-3 pb-3">
                <div id="system-persona-tabs" class="system-persona-tabs"></div>
            </div>
        </section>
        <main id="chat-area" class="flex-grow overflow-y-auto p-4 space-y-4 chat-bg scroll-smooth bg-transparent"></main>
        <footer class="p-4 border-t border-[#b89d74] dark:border-slate-700 bg-[#e2cfa7] dark:bg-slate-800 pb-[calc(env(safe-area-inset-bottom)+1rem)]">
            <div class="grid grid-cols-10 gap-3 items-center">
                <div class="col-span-8">
                    <textarea id="user-input" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-2xl px-4 py-2 focus:outline-none resize-none" placeholder="問いを深く刻む..." rows="1" enterkeyhint="enter"></textarea>
                </div>
                <div class="col-span-2 flex justify-center">
                    <button id="send-btn" onclick="handleSend()" class="bg-slate-800 dark:bg-slate-100 dark:text-slate-800 text-white w-12 h-12 rounded-full shadow-lg active:scale-90 transition-all flex items-center justify-center text-xl">🖋️</button>
                </div>
            </div>
        </footer>

        <aside id="history-panel" class="hidden absolute inset-0 bg-black/60 z-40">
            <div class="absolute right-0 top-0 h-full w-72 bg-white dark:bg-slate-900 p-4 overflow-y-auto">
                <h3 class="font-bold dark:text-white mb-3">会話履歴</h3>
                <div id="session-list" class="space-y-2"></div>
                <button onclick="toggleHistoryPanel()" class="mt-4 w-full bg-slate-700 text-white rounded-lg py-2">閉じる</button>
            </div>
        </aside>

        <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-6">
            <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-6 w-full shadow-2xl border border-slate-200 dark:border-slate-700 transform transition-all scale-100 max-h-[90dvh] overflow-y-auto">
                <h2 class="text-2xl font-serif font-bold mb-6 text-slate-800 dark:text-white text-center">写本の管理</h2>
                <div class="space-y-4">
                    <div class="settings-sections space-y-3">
                        <button type="button" class="settings-section-toggle" data-target="account-link-section">アカウント / 連携</button>
                        <div id="account-link-section" class="settings-section-panel hidden">
                            <input id="google-client-id" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="Google Client ID">
                            <div class="flex gap-2 mt-2">
                                <button id="google-login-btn" class="flex-1 bg-emerald-700 text-white py-2 rounded-lg settings-action-btn">Google接続</button>
                                <button id="google-logout-btn" class="flex-1 bg-slate-500 text-white py-2 rounded-lg settings-action-btn">接続解除</button>
                            </div>
                        </div>

                        <button type="button" class="settings-section-toggle" data-target="ai-settings-section">AI設定</button>
                        <div id="ai-settings-section" class="settings-section-panel hidden space-y-3">
                            <div class="settings-subsection">
                                <p class="settings-subsection-title">モデル / APIキー</p>
                                <select id="provider" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white">
                                    <option value="gemini">Gemini</option>
                                    <option value="openai">ChatGPT (OpenAI)</option>
                                </select>
                                <select id="model" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white mt-2"></select>
                                <input type="password" id="gemini-key" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white mt-2" placeholder="Gemini API Key">
                                <input type="password" id="openai-key" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white mt-2" placeholder="OpenAI API Key">
                            </div>
                            <div class="settings-subsection">
                                <p class="settings-subsection-title">振る舞い（プロンプト・温度）</p>
                                <div class="space-y-2">
                                    <textarea id="system-prompt" rows="4" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="システムプロンプト"></textarea>
                                    <button id="clear-system-prompt-btn" class="ml-auto block w-auto bg-slate-200 dark:bg-slate-700 dark:text-white px-3 py-1.5 text-sm rounded-lg settings-action-btn">システムプロンプトを空にする</button>
                                </div>
                                <label class="text-sm dark:text-white">温度 <span id="temperature-value"></span></label>
                                <input id="temperature" type="range" min="0" max="2" step="0.1" class="w-full">
                            </div>
                            <div class="settings-subsection">
                                <p class="settings-subsection-title">コンテキスト / 署名</p>
                                <input id="user-signature" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="ユーザー署名（例: Blanche）">
                                <label class="text-sm dark:text-white">コンテキスト長（トークン） <span id="max-tokens-value"></span></label>
                                <input id="max-tokens" type="range" min="256" max="150000" step="256" class="w-full">
                            </div>
                        </div>

                        <button type="button" class="settings-section-toggle" data-target="display-settings-section">表示設定</button>
                        <div id="display-settings-section" class="settings-section-panel hidden">
                            <button onclick="toggleDarkMode()" id="mode-toggle-btn" class="w-full p-3 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold dark:text-white settings-action-btn"></button>
                        </div>

                        <button type="button" class="settings-section-toggle" data-target="advanced-settings-section">詳細設定</button>
                        <div id="advanced-settings-section" class="settings-section-panel hidden space-y-2">
                            <button type="button" class="settings-section-toggle settings-sub-toggle" data-target="developer-settings-section">開発者向け</button>
                            <div id="developer-settings-section" class="settings-section-panel hidden">
                                <button type="button" class="settings-section-toggle settings-sub-toggle" data-target="log-settings-section">ログ</button>
                                <div id="log-settings-section" class="settings-section-panel hidden">
                                    <button onclick="toggleHistoryPanel()" class="w-full bg-slate-700 text-white rounded-lg py-2 settings-action-btn">ログ表示画面を開く</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
                    <p id="drive-status" class="text-xs text-slate-600 dark:text-slate-300">Drive: 未接続</p>
                    <input id="persona-name" class="w-full border rounded-xl p-3 dark:bg-slate-700 dark:text-white" placeholder="保存するプリセット名">
                    <button onclick="savePersona()" class="w-full bg-indigo-600 text-white py-2 rounded-lg settings-action-btn">プリセット保存</button>
                    <button onclick="startNewSession()" class="w-full bg-slate-600 text-white py-2 rounded-lg settings-action-btn">新規会話を開始</button>
                </div>
                <button onclick="toggleSettings()" class="w-full mt-6 bg-slate-800 dark:bg-white dark:text-slate-800 text-white py-3 rounded-2xl font-bold settings-action-btn">書庫に戻る</button>
            </div>
        </div>
    </div>

    <script src="assets/js/providers.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
